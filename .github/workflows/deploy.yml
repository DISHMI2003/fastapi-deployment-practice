name: Deploy FastAPI Application

on:
  push:
    branches:
      - main


jobs:

  build-and-push:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1


    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    - name: Build backend image
      run: |
        docker build \
        -t 163831439393.dkr.ecr.eu-north-1.amazonaws.com/backend:latest \
        ./backend


    - name: Build frontend image
      run: |
        docker build \
        -t 163831439393.dkr.ecr.eu-north-1.amazonaws.com/frontend:latest \
        ./frontend


    - name: Push images
      run: |
        docker push 163831439393.dkr.ecr.eu-north-1.amazonaws.com/backend:latest
        docker push 163831439393.dkr.ecr.eu-north-1.amazonaws.com/frontend:latest